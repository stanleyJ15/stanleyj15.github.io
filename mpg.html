    button {

      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;

<div class="card">
  <img src="logo.webp" alt="Calculator Logo">
  <h1 style="color: #000000;">MPG Calculator</h1>

  <input type="number" id="miles" placeholder="Miles Traveled">
  <input type="number" id="gallons" placeholder="Gallons Used">

  <button onclick="calculate()">Calculate MPG</button>

  <div class="result" id="result" style="color: #000000;">Your MPG will appear here</div>
</div>

<script src="script.js"></script>

<script>
function calculate() {
  var miles = parseFloat(document.getElementById("miles").value);
  var gallons = parseFloat(document.getElementById("gallons").value);

  if (isNaN(miles) || isNaN(gallons) || gallons === 0) {
    document.getElementById("result").innerHTML =
      "Please enter valid numbers";
    return;
  }

  var mpg = miles / gallons;

  document.getElementById("result").innerHTML =
    "Your MPG is: " + mpg.toFixed(2);
}
</script>

</body>
