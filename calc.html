<!DOCTYPE html>
<html>
<head>
    <title>MPG Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .logo {
            font-size: 30px;
        }
    </style>
</head>

<body>

<div class="card">
 <img src="logo.webp" alt="Calculator Logo" width="80">
    <h1>MPG Calculator</h1>

    <input type="number" id="miles" placeholder="Miles Traveled">
    <input type="number" id="gallons" placeholder="Gallons Used">

    <button onclick="calculate()">Calculate MPG</button>

    <div class="result" id="result">Your MPG will appear here</div>

</div>

<script>
function calculate() {
    var miles = parseFloat(document.getElementById("miles").value);
    var gallons = parseFloat(document.getElementById("gallons").value);

    if (isNaN(miles) || isNaN(gallons) || gallons === 0) {
        document.getElementById("result").innerHTML =
            "Please enter valid numbers";
        return;
    }

    var mpg = miles / gallons;

    document.getElementById("result").innerHTML =
        "Your MPG is: " + mpg.toFixed(2);
}
</script>

</body>
</html>
